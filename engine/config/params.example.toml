# Triviu engine parameters — copy to params.toml and adjust.
# Changes to CANONICAL parameters go through a PR (see CONTRIBUTING.md);
# the on-chain mirror lives in ParameterRegistry.

[network]
chain_id = 137           # Polygon PoS
rpc_url = "http://127.0.0.1:8545"  # default: local fork (sim/). Prefer a self-hosted RPC in production.

[execution]
dry_run = true           # default: NEVER sends a transaction. Change deliberately.
min_profit_wei = "3100000000000000"  # teaching example; calibrate via simulation
max_slippage_bps = 30

[assets]
# Minimal example whitelist (official Polygon addresses — verify them yourself):
wmatic = "0x0d500B1d8E8eF31E21C99d1Db9A6444d3ADf1270"
usdc   = "0x3c499c542cEF5E3811e1192ce70d8cC03d5c3359"
weth   = "0x7ceB23fD6bC0adD59E62ac25578270cFf1b9f619"
