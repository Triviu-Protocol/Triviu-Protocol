# CI pública por princípio: qualquer pessoa vê o que passa e o que falha.
name: ci
on:
  pull_request:
  push:
    branches: [main]
jobs:
  contracts:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with: { submodules: recursive }
      - uses: foundry-rs/foundry-toolchain@v1
      - run: forge build
        working-directory: contracts
      - run: forge test -vvv
        working-directory: contracts
  engine:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: 20 }
      - run: npm install
        working-directory: engine
      - run: npm run typecheck
        working-directory: engine
      - run: npm test
        working-directory: engine

  # Multi-chain honesty sentinel: no public surface may claim a chain is "live"
  # (nothing is deployed) or assert single-chain exclusivity. Fails on regression.
  surfaces:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: 20 }
      - run: node scripts/check-multichain-honesty.mjs

  # Static analysis of the contracts. Fails the build only on HIGH findings;
  # the MEDIUM/INFO items are already triaged in docs/audits (Medusa report).
  slither:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with: { submodules: recursive }
      - uses: foundry-rs/foundry-toolchain@v1
      - uses: crytic/slither-action@v0.4.0
        with:
          target: contracts/
          slither-config: contracts/slither.config.json
          fail-on: high
